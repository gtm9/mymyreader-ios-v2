name: VoiceNotes
options:
  bundleIdPrefix: com.remargatech
packages:
  Qwen3TTS:
    path: Packages/mlx-swift-qwen3-tts
targets:
  VoiceNotes:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGN_STYLE: ${CI_CODE_SIGN_STYLE:Automatic}
      CODE_SIGN_IDENTITY: ${CI_CODE_SIGN_IDENTITY:Apple Development}
      PROVISIONING_PROFILE_SPECIFIER: ${CI_PROVISIONING_PROFILE_UUID:""}
    sources:
      - path: Sources
      - path: Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
        type: folder
    dependencies:
      - package: Qwen3TTS
        product: Qwen3TTS
    entitlements:
      path: Entitlements.entitlements
    info:
      path: Info.plist
      properties:
        NSMicrophoneUsageDescription: "VoiceNotes requires microphone access to record your acoustic profile so the AI can securely clone your voice locally on your device."
        UILaunchStoryboardName: ""
    scheme:
      testTargets:
        - VoiceNotesTests
        - VoiceNotesUITests
  VoiceNotesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Tests/VoiceNotesTests
    dependencies:
      - target: VoiceNotes
  VoiceNotesUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Tests/VoiceNotesUITests
    dependencies:
      - target: VoiceNotes
