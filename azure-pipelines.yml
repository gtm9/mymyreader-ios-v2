trigger:
  branches:
    include:
      - master
      - main

pr:
  branches:
    include:
      - master
      - main

jobs:
- job: BuildTestAndDeploy
  displayName: 'Build, Test, and Deploy'
  pool:
    vmImage: 'macOS-latest'
  variables:
    scheme: 'VoiceNotes'
  steps:
    - checkout: self
      submodules: true

    - script: |
        rm -f Models
        mkdir -p $(System.DefaultWorkingDirectory)/Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
      displayName: 'Create Model Directory for Cache'

    - task: Cache@2
      displayName: 'Cache MLX Model'
      inputs:
        key: '"qwen3-tts" | "$(Agent.OS)"'
        path: '$(System.DefaultWorkingDirectory)/Models/Qwen3-TTS-12Hz-0.6B-Base-4bit'
        cacheHitVar: 'MODEL_CACHE_RESTORED'

    - script: |
        brew install xcodegen
        pip3 install -U "huggingface_hub[cli]" --break-system-packages
      displayName: 'Install Dependencies'

    - script: |
        hf download mlx-community/Qwen3-TTS-12Hz-0.6B-Base-4bit --local-dir Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
      displayName: 'Download MLX Model'
      condition: ne(variables.MODEL_CACHE_RESTORED, 'true')

    - script: |
        rm -rf VoiceNotes.xcodeproj
        xcodegen generate
      displayName: 'Generate Xcode Project'

    - task: Xcode@5
      displayName: 'Build and Test App'
      inputs:
        actions: 'build test'
        configuration: 'Debug'
        sdk: 'iphonesimulator'
        xcWorkspacePath: 'VoiceNotes.xcodeproj'
        scheme: '$(scheme)'
        destinationPlatformOption: 'iOS'
        destinationSimulators: 'iPhone 17'
        useXcpretty: false
        args: '-only-testing:VoiceNotesTests'
        publishJUnitResults: true

    - task: InstallAppleCertificate@2
      displayName: 'Install Apple Certificate'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
      inputs:
        certSecureFile: '$(appleCertificate)'
        certPwd: '$(appleCertificatePassword)'
        keychain: 'temp'

    - task: InstallAppleProvisioningProfile@1
      displayName: 'Install Provisioning Profile'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
      inputs:
        provisioningProfileLocation: 'secureFiles'
        provProfileSecureFile: '$(appleProvisioningProfile)'

    - script: |
        PROFILE_FILE=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -n 1)
        EXTRACTED_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< $(security cms -D -i "$PROFILE_FILE"))
        EXTRACTED_TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' /dev/stdin <<< $(security cms -D -i "$PROFILE_FILE"))
        EXTRACTED_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' /dev/stdin <<< $(security cms -D -i "$PROFILE_FILE") | sed "s/^${EXTRACTED_TEAM_ID}\.//")

        echo "--- Extracted from Profile ---"
        echo "UUID: $EXTRACTED_UUID"
        echo "Team ID: $EXTRACTED_TEAM_ID"
        echo "Bundle ID: $EXTRACTED_BUNDLE_ID"

        cat <<PLIST_EOF > ExportOptions.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$EXTRACTED_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>$EXTRACTED_BUNDLE_ID</key>
                <string>$EXTRACTED_UUID</string>
            </dict>
        </dict>
        </plist>
        PLIST_EOF

        sed -i '' "/CURRENT_PROJECT_VERSION: 1/a\\
              CODE_SIGN_STYLE: \"Manual\"\\
              CODE_SIGN_IDENTITY: \"${APPLE_CERTIFICATE_SIGNING_IDENTITY}\"\\
              PROVISIONING_PROFILE_SPECIFIER: \"$EXTRACTED_UUID\"\\
              DEVELOPMENT_TEAM: \"$EXTRACTED_TEAM_ID\"\\
        " project.yml

        # Force the bundle ID in project.yml to exactly match the profile
        PREFIX=$(echo "$EXTRACTED_BUNDLE_ID" | sed 's/\.VoiceNotes$//')
        sed -i '' "s/bundleIdPrefix: .*/bundleIdPrefix: $PREFIX/" project.yml

        rm -rf VoiceNotes.xcodeproj
        xcodegen generate
      displayName: 'Inject Code Signing and Re-Generate Project'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
      env:
        APPLE_CERTIFICATE_SIGNING_IDENTITY: $(APPLE_CERTIFICATE_SIGNING_IDENTITY)

    - task: Xcode@5
      displayName: 'Archive App'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
      inputs:
        actions: 'archive'
        configuration: 'Release'
        sdk: 'iphoneos'
        xcWorkspacePath: 'VoiceNotes.xcodeproj'
        scheme: '$(scheme)'
        packageApp: true
        exportPath: '$(build.artifactStagingDirectory)/output'
        exportOptions: 'plist'
        exportOptionsPlist: 'ExportOptions.plist'
        useXcpretty: false

    - task: AppStoreRelease@1
      displayName: 'Upload to TestFlight'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
      inputs:
        serviceEndpoint: 'AppleAppStoreConnection'
        appIdentifier: 'com.remargatech.VoiceNotes'
        appType: 'iOS'
        ipaPath: '$(build.artifactStagingDirectory)/output/*.ipa'
        releaseTrack: 'TestFlight'
