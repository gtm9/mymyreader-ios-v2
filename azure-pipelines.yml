trigger:
  branches:
    include:
      - master
      - main

pr:
  branches:
    include:
      - master
      - main

stages:
- stage: BuildAndTest
  displayName: 'Build and Test'
  jobs:
  - job: Test
    pool:
      vmImage: 'macOS-latest'
    variables:
      scheme: 'VoiceNotes'
    steps:
      - checkout: self
        submodules: true

      - script: |
          rm -f Models
          mkdir -p $(System.DefaultWorkingDirectory)/Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
        displayName: 'Create Model Directory for Cache'

      - task: Cache@2
        displayName: 'Cache MLX Model'
        inputs:
          key: '"qwen3-tts" | "$(Agent.OS)"'
          path: '$(System.DefaultWorkingDirectory)/Models/Qwen3-TTS-12Hz-0.6B-Base-4bit'
          cacheHitVar: 'MODEL_CACHE_RESTORED'

      - script: |
          brew install xcodegen
          pip3 install -U "huggingface_hub[cli]" --break-system-packages
        displayName: 'Install Dependencies'

      - script: |
          hf download mlx-community/Qwen3-TTS-12Hz-0.6B-Base-4bit --local-dir Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
        displayName: 'Download MLX Model'
        condition: ne(variables.MODEL_CACHE_RESTORED, 'true')

      - script: |
          rm -rf VoiceNotes.xcodeproj
          xcodegen generate
        displayName: 'Generate Xcode Project'

      - task: Xcode@5
        displayName: 'Build and Test App'
        inputs:
          actions: 'build test'
          configuration: 'Debug'
          sdk: 'iphonesimulator'
          xcWorkspacePath: 'VoiceNotes.xcodeproj'
          scheme: '$(scheme)'
          destinationPlatformOption: 'iOS'
          destinationSimulators: 'iPhone 17'
          useXcpretty: false
          args: '-only-testing:VoiceNotesTests'
          publishJUnitResults: true

- stage: DeployToTestFlight
  displayName: 'Deploy to TestFlight'
  dependsOn: BuildAndTest
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  jobs:
  - job: ArchiveAndDeploy
    pool:
      vmImage: 'macOS-latest'
    variables:
      scheme: 'VoiceNotes'
    steps:
      - checkout: self
        submodules: true

      - script: |
          rm -f Models
          mkdir -p $(System.DefaultWorkingDirectory)/Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
        displayName: 'Create Model Directory for Cache'

      - task: Cache@2
        displayName: 'Cache MLX Model'
        inputs:
          key: '"qwen3-tts" | "$(Agent.OS)"'
          path: '$(System.DefaultWorkingDirectory)/Models/Qwen3-TTS-12Hz-0.6B-Base-4bit'
          cacheHitVar: 'MODEL_CACHE_RESTORED'

      - script: |
          brew install xcodegen
          pip3 install -U "huggingface_hub[cli]" --break-system-packages
        displayName: 'Install Dependencies'

      - script: |
          hf download mlx-community/Qwen3-TTS-12Hz-0.6B-Base-4bit --local-dir Models/Qwen3-TTS-12Hz-0.6B-Base-4bit
        displayName: 'Download MLX Model'
        condition: ne(variables.MODEL_CACHE_RESTORED, 'true')

      - task: InstallAppleCertificate@2
        displayName: 'Install Apple Certificate'
        inputs:
          certSecureFile: '$(appleCertificate)'
          certPwd: '$(appleCertificatePassword)'
          keychain: 'temp'

      - task: InstallAppleProvisioningProfile@1
        displayName: 'Install Provisioning Profile'
        inputs:
          provisioningProfileLocation: 'secureFiles'
          provProfileSecureFile: '$(appleProvisioningProfile)'

      - script: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>W5YR8QWKH6</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.remargatech.VoiceNotes</key>
                  <string>${APPLE_PROV_PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF
          sed -i '' "/CURRENT_PROJECT_VERSION: 1/a\\
                CODE_SIGN_STYLE: \"Manual\"\\
                CODE_SIGN_IDENTITY: \"${APPLE_CERTIFICATE_SIGNING_IDENTITY}\"\\
                PROVISIONING_PROFILE_SPECIFIER: \"${APPLE_PROV_PROFILE_UUID}\"\\
                DEVELOPMENT_TEAM: \"W5YR8QWKH6\"\\
          " project.yml
          rm -rf VoiceNotes.xcodeproj
          xcodegen generate
        displayName: 'Generate Xcode Project and Export Options'
        env:
          APPLE_CERTIFICATE_SIGNING_IDENTITY: $(APPLE_CERTIFICATE_SIGNING_IDENTITY)
          APPLE_PROV_PROFILE_UUID: $(APPLE_PROV_PROFILE_UUID)

      - task: Xcode@5
        displayName: 'Archive App'
        inputs:
          actions: 'archive'
          configuration: 'Release'
          sdk: 'iphoneos'
          xcWorkspacePath: 'VoiceNotes.xcodeproj'
          scheme: '$(scheme)'
          packageApp: true
          exportPath: '$(build.artifactStagingDirectory)/output'
          exportOptions: 'plist'
          exportOptionsPlist: 'ExportOptions.plist'
          useXcpretty: false

      - task: AppStoreRelease@1
        displayName: 'Upload to TestFlight'
        inputs:
          serviceEndpoint: 'AppleAppStoreConnection'
          appIdentifier: 'com.remargatech.VoiceNotes'
          appType: 'iOS'
          ipaPath: '$(build.artifactStagingDirectory)/output/*.ipa'
          releaseTrack: 'TestFlight'
